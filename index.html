<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilpeli | Official Links</title>
  
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');

    body {
      font-family: 'Heebo', sans-serif;
      background:
        radial-gradient(circle at 100% 100%, rgba(255, 165, 0, 0.15) 0%, rgba(255, 165, 0, 0) 25%),
        radial-gradient(circle at 0% 100%, rgba(255, 69, 0, 0.2) 0%, rgba(255, 69, 0, 0) 25%),
        radial-gradient(circle at top, #1a1005, #0a0500 80%);
      background-color: #0a0500;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: white;
    }

    #spotlight {
      position: fixed;
      top: 0;
      left: 0;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(255, 140, 0, 0.1) 0%, rgba(255, 140, 0, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
      display: none;
    }

    #profile-image-container {
      transition: all 0.4s ease;
      border: 4px solid rgba(255, 165, 0, 0.3);
      overflow: hidden;
      width: 128px;
      height: 128px;
    }

    #profile-image-container:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(255, 69, 0, 0.6);
      border-color: rgba(255, 215, 0, 0.8);
    }

    .card {
      background: linear-gradient(145deg, #1f1408, #0a0500);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      transition: all .25s ease;
      position: relative;
      z-index: 2;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
    }

    .card-kick:hover {
      box-shadow: 0 0 25px rgba(255, 165, 0, 0.4), 0 20px 50px rgba(0,0,0,.8);
      border-color: rgba(255, 165, 0, 0.5);
    }

    .card-discord:hover {
      box-shadow: 0 0 25px rgba(255, 69, 0, 0.4), 0 20px 50px rgba(0,0,0,.8);
      border-color: rgba(255, 69, 0, 0.5);
    }

    .card-tiktok:hover {
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.4), 0 20px 50px rgba(0,0,0,.8);
      border-color: rgba(255, 215, 0, 0.5);
    }

    .neon { text-shadow: 0 0 12px rgba(255, 140, 0, 0.5); }

    #splash-screen {
      position: fixed;
      inset: 0;
      background: #0a0500;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.4s ease-out;
    }

    .splash-logo-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #ff8c00;
      animation: logoPulse 1s 2, fadeInElement 0.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeInElement { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes logoPulse { 0%, 100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 30px rgba(255, 140, 0, 0); } }

    #main-page-content {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease-in;
    }

    #main-page-content.visible {
      opacity: 1;
      visibility: visible;
    }

    .platform-icon {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }
  </style>
</head>

<body>
  <div id="spotlight"></div>

  <div id="splash-screen">
    <img src="https://files.kick.com/images/user/67726613/profile_image/conversion/d1bb872a-0460-4307-a26d-0e84a50176eb-fullsize.webp" class="splash-logo-img" alt="Logo">
  </div>

  <div id="main-page-content" class="flex flex-col items-center px-6 py-14">
    <div class="text-center mb-12 relative z-10">
        <div class="relative inline-block">
            <div class="rounded-full bg-zinc-800 flex items-center justify-center mx-auto mb-5 shadow-2xl" id="profile-image-container">
                <img src="https://files.kick.com/images/user/67726613/profile_image/conversion/d1bb872a-0460-4307-a26d-0e84a50176eb-fullsize.webp" alt="Pilpeli Logo" class="w-full h-full object-cover">
            </div>
        </div>
      <h1 class="text-4xl font-black text-white neon tracking-tight">Pilpeli</h1>
      <p class="mt-2 text-sm text-orange-400 font-bold tracking-widest uppercase">Official Links</p>
    </div>

    <div class="w-full max-w-md space-y-4 mx-auto relative z-10">

      <a href="https://kick.com/pilpeli" target="_blank" class="card card-kick block rounded-2xl p-6 text-center">
        <div class="text-xl font-black text-orange-500 flex items-center justify-center gap-3">
          <img src="https://github.com/OdedSVR/images/blob/main/kick%20logo.png?raw=true" class="platform-icon" alt="Kick Logo">
          Kick הערוץ הרשמי
        </div>
      </a>

      <a href="https://www.tiktok.com/@pilpeli1" target="_blank" class="card card-tiktok block rounded-2xl p-6 text-center">
        <div class="text-xl font-black text-yellow-500 flex items-center justify-center gap-3">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.39-2.84.12-.94.42-1.62 1.34-1.84 2.34-.11.53-.1 1.08.01 1.62.22 1.11 1.14 2.01 2.23 2.19.82.16 1.72.01 2.45-.42.89-.5 1.42-1.48 1.47-2.49.03-2.61.01-5.22.01-7.84z"/></svg>
          TikTok
        </div>
      </a>

      <a href="https://discord.gg/amH5Adtc" target="_blank" class="card card-discord block rounded-2xl p-6 text-center">
        <div class="text-xl font-black text-red-500 flex items-center justify-center gap-3">
          <img src="https://github.com/OdedSVR/images/blob/main/discor%20logo.png?raw=true" class="platform-icon" alt="Discord Logo">
          Discord
        </div>
      </a>

    </div>

    <footer class="mt-16 text-xs text-orange-900/60 font-bold text-center">
      © 2026 Pilpeli | Created by Piker_r
    </footer>
  </div>

  <script>
    const spotlight = document.getElementById('spotlight');
    const mainContent = document.getElementById('main-page-content');
    const splash = document.getElementById('splash-screen');

    document.addEventListener('mousemove', (e) => {
      spotlight.style.left = e.clientX + 'px';
      spotlight.style.top = e.clientY + 'px';
    });

    function activateSite() {
      if(splash) splash.style.opacity = '0';
      setTimeout(() => {
        if(splash) splash.style.display = 'none';
        if(mainContent) mainContent.classList.add('visible');
        if(spotlight) spotlight.style.display = 'block';
      }, 400);
    }

    setTimeout(activateSite, 1500);
  </script>
</body>
</html>
